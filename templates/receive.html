{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

<div class="card shadow p-4" style="max-width:500px; margin:auto;">

<h4 class="mb-4 text-center">📥 Receive Order</h4>

<form method="post">

<div class="mb-3">
<label class="form-label">School</label>
<input class="form-control" value="{{challan[1]}}" readonly>
</div>

<div class="mb-3">
<label class="form-label">Dispatched Qty</label>
<input class="form-control" value="{{challan[2]}}" readonly>
</div>

<div class="mb-3">
<label class="form-label">Received Qty</label>
<input name="received_qty" type="number" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Received By</label>
<input name="received_by" class="form-control" required>
</div>

<button class="btn btn-success w-100">Confirm Receiving</button>

<a href="/orders" class="btn btn-secondary w-100 mt-2">Cancel</a>

</form>

</div>

</div>

{% endblock %}
