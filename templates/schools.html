{% extends "base.html" %}

{% block content %}

<h2>Schools</h2>

<form method="post" class="mb-4">

<div class="mb-3">
<label>School Name</label>
<input class="form-control" name="name" required>
</div>

<div class="mb-3">
<label>Address</label>
<input class="form-control" name="address" required>
</div>

<div class="mb-3">
<label>Contact Person</label>
<input class="form-control" name="contact_person" required>
</div>

<div class="mb-3">
<label>Phone Number</label>
<input class="form-control" name="phone" required>
</div>

<button class="btn btn-primary">Add School</button>

</form>

<hr>

<h4>School List</h4>

<table class="table table-bordered">

<tr>
<th>#</th>
<th>Name</th>
<th>Address</th>
<th>Contact</th>
<th>Phone</th>
</tr>

{% for s in schools %}

<tr>
<td>{{loop.index}}</td>
<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
<td>{{s[3]}}</td>
<td>{{s[4]}}</td>
</tr>

{% endfor %}

</table>

{% endblock %}
