{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Distribution History</h2>

<div class="card p-3 shadow-sm">

<table class="table table-striped table-bordered align-middle">

<thead class="table-dark">
<tr>
<th>School</th>
<th>Book</th>
<th>Quantity</th>
</tr>
</thead>

<tbody>

{% for d in data %}
<tr>
<td>{{d[0]}}</td>
<td>{{d[1]}}</td>
<td>{{d[2]}}</td>
</tr>
{% endfor %}

{% if not data %}
<tr>
<td colspan="3" class="text-center text-muted">
No distribution records yet
</td>
</tr>
{% endif %}

</tbody>

</table>

</div>

{% endblock %}
