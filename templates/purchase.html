{% extends "base.html" %}

{% block content %}

<h2>Purchase Books (VBET)</h2>

<form method="post">

<div class="mb-3">
<label>Book</label>

<select class="form-control" name="book">

{% for b in books %}

<option value="{{b[0]}}">
{{b[1]}} - Class {{b[2]}}
</option>

{% endfor %}

</select>
</div>

<div class="mb-3">
<label>Vendor Name</label>
<input list="vendor_list" class="form-control" name="vendor" placeholder="Select or type vendor">

<datalist id="vendor_list">
{% for v in vendors %}
<option value="{{v[0]}}">
{% endfor %}
</datalist>

</div>
<div class="mb-3">
<label>Bill Number</label>
<input class="form-control" name="bill_no">
</div>

<div class="mb-3">
<label>Narration (Optional)</label>
<textarea class="form-control" name="narration"></textarea>
</div>


<div class="mb-3">
<label>Purchase Price</label>
<input class="form-control" name="price">
</div>

<div class="mb-3">
<label>Quantity</label>
<input class="form-control" name="qty">
</div>

<button class="btn btn-success">Add Purchase</button>

</form>

<h4 class="mt-5">Purchase History</h4>

<table class="table table-bordered">
<tr>
<th>#</th>
<th>Book</th>
<th>Vendor</th>
<th>Qty</th>
<th>Price</th>
<th>Bill No</th>
<th>Date</th>
<th>Note</th>
</tr>

{% for p in purchases %}
<tr>
<td>{{loop.index}}</td>
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>
<td>{{p[3]}}</td>
<td>₹{{p[4]}}</td>
<td>{{p[5]}}</td>
<td>{{p[6]}}</td>
<td>{{p[7]}}</td>
</tr>
{% endfor %}
</table>

{% endblock %}
