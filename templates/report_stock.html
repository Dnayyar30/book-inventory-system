{% extends "base.html" %}
{% block content %}

<h3>Stock Calculation Report</h3>

<table class="table table-bordered">

<tr>
<th>Book</th>
<th>Purchased</th>
<th>Distributed</th>
<th>Sold</th>
<th>Balance</th>
</tr>

{% for d in data %}
<tr>
<td>{{d[0]}}</td>
<td>{{d[1]}}</td>
<td>{{d[2]}}</td>
<td>{{d[3]}}</td>
<td>{{d[1] - d[2] - d[3]}}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
